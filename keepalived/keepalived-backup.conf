! Keepalived Configuration - BACKUP Node
! Takes over the Virtual IP if MASTER fails

global_defs {
    router_id HAPROXY_BACKUP
    script_user root
    enable_script_security
}

vrrp_script check_haproxy {
    script "/bin/sh -c 'killall -0 haproxy'"
    interval 2
    weight -20
    fall 3
    rise 2
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 90                 # Backup has lower priority
    advert_int 1

    authentication {
        auth_type PASS
        auth_pass secretpass
    }

    virtual_ipaddress {
        192.168.100.100/24
    }

    track_script {
        check_haproxy
    }
}
