! Keepalived Configuration - MASTER Node
! Provides high availability via Virtual IP (VIP) failover

global_defs {
    router_id HAPROXY_MASTER
    script_user root
    enable_script_security
}

# Health check script for HAProxy
vrrp_script check_haproxy {
    script "/bin/sh -c 'killall -0 haproxy'"
    interval 2          # Check every 2 seconds
    weight -20          # Reduce priority by 20 on failure
    fall 3              # Require 3 failures to mark DOWN
    rise 2              # Require 2 successes to mark UP
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0
    virtual_router_id 51
    priority 100                # Master has higher priority
    advert_int 1                # Advertisement interval (seconds)

    authentication {
        auth_type PASS
        auth_pass secretpass     # Shared secret between MASTER/BACKUP
    }

    virtual_ipaddress {
        192.168.100.100/24      # Virtual IP address for failover
    }

    track_script {
        check_haproxy            # Track HAProxy health
    }
}
