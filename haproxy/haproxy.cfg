#---------------------------------------------------------------------
# HAProxy Configuration for Containerized Static Website Deployment
#---------------------------------------------------------------------

global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    retries 3

#---------------------------------------------------------------------
# Stats page - accessible at http://<haproxy-ip>:8404/stats
# Prometheus metrics at http://<haproxy-ip>:8404/metrics
#---------------------------------------------------------------------
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats show-legends
    stats show-node
    http-request use-service prometheus-exporter if { path /metrics }

#---------------------------------------------------------------------
# Main frontend - receives all incoming HTTP traffic
#---------------------------------------------------------------------
frontend http_front
    bind *:80
    default_backend http_back

    # ACL-based routing by hostname
    acl is_site1 hdr(host) -i site1.local
    acl is_site2 hdr(host) -i site2.local
    acl is_site3 hdr(host) -i site3.local
    acl is_site4 hdr(host) -i site4.local

    use_backend site1_backend if is_site1
    use_backend site2_backend if is_site2
    use_backend site3_backend if is_site3
    use_backend site4_backend if is_site4

#---------------------------------------------------------------------
# Default backend - round-robin across all 4 website containers
#---------------------------------------------------------------------
backend http_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200

    server website1 website1:80 check inter 5s fall 3 rise 2
    server website2 website2:80 check inter 5s fall 3 rise 2
    server website3 website3:80 check inter 5s fall 3 rise 2
    server website4 website4:80 check inter 5s fall 3 rise 2

#---------------------------------------------------------------------
# Individual backends for host-based routing
#---------------------------------------------------------------------
backend site1_backend
    server website1 website1:80 check

backend site2_backend
    server website2 website2:80 check

backend site3_backend
    server website3 website3:80 check

backend site4_backend
    server website4 website4:80 check
